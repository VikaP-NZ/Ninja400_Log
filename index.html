<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ninja 400 — Elite Garage Pro</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@300;400;600;700&family=Syne:wght@400;700;800&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
:root {
  --bg: #0d0a0a; --bg-card: #140f0f; --bg-detail: #1a0d0d;
  --border: #2a1e1e; --border-red: #4d1515;
  --accent: #ef4444; --accent-light: #f87171;
  --text: #f1f5f9; --text-muted: #94a3b8; --text-dim: #64748b;
  --green: #22c55e; --green-bg: #052e16;
  --amber: #f59e0b; --amber-bg: #2d1b00;
  --red: #ef4444; --red-bg: #2d0a0a;
  --input-bg: #1a1111;
}
body { background:var(--bg); color:var(--text); font-family:'JetBrains Mono',monospace; min-height:100vh; font-size:13px; line-height:1.4; }
::-webkit-scrollbar{width:5px} ::-webkit-scrollbar-thumb{background:var(--border-red);border-radius:10px}

.header{border-bottom:1px solid var(--border);padding:24px;background: linear-gradient(to bottom, #1a0d0d, var(--bg))}
.header-top{display:flex;align-items:flex-start;justify-content:space-between;flex-wrap:wrap;gap:15px;margin-bottom:18px}
.header-title{font-family:'Syne',sans-serif;font-size:22px;font-weight:800;letter-spacing:-0.5px;color:#fff;text-transform:uppercase}
.stats-row{display:flex;gap:10px;flex-wrap:wrap}
.stat-box{border:1px solid var(--border-red);border-radius:10px;padding:10px 15px;background:rgba(26,13,13,0.5);cursor:pointer;transition:all 0.2s}
.stat-box:hover{border-color:var(--accent);background:var(--bg-detail);transform:translateY(-2px)}
.stat-label{font-size:9px;color:var(--text-muted);text-transform:uppercase;margin-bottom:3px}
.stat-value{color:var(--accent-light);font-size:13px;font-weight:700}

.nav-row{display:flex;justify-content:space-between;align-items:center;padding:0 24px 15px;border-bottom:1px solid var(--border);background:var(--bg)}
.nav-tabs{display:flex;gap:8px}
.nav-pill{padding:8px 16px;border-radius:20px;border:1px solid var(--border-red);background:transparent;color:var(--text-dim);cursor:pointer;font-weight:700;font-size:11px;transition:all 0.2s}
.nav-pill.active{background:var(--accent);border-color:var(--accent);color:#fff}

#saveToast { position: fixed; bottom: 20px; right: 20px; background: var(--green); color: white; padding: 10px 20px; border-radius: 8px; display: none; font-weight: bold; z-index: 1000; box-shadow: 0 4px 15px rgba(0,0,0,0.5); }

.quick-container{max-width:850px;margin:20px auto;padding:0 20px}
.quick-card{background:var(--bg-card);border:1px solid var(--border-red);border-radius:16px;padding:25px;margin-bottom:20px}
.quick-question{font-family:'Syne',sans-serif;font-size:15px;font-weight:700;color:var(--accent-light);margin-bottom:15px}
.quick-inputs{display:grid;grid-template-columns:1fr 1fr 1fr;gap:15px}

.body-wrap{display:flex;min-height:calc(100vh - 160px)}
.list-panel{flex:1;padding:20px 24px;overflow-y:auto;min-width:0}
.detail-panel{width:480px;flex-shrink:0;padding:24px;overflow-y:auto;background:var(--bg-card);border-left:1px solid var(--border);display:none}

.card{border:1px solid var(--border);border-radius:12px;padding:15px;background:var(--bg-card);display:flex;align-items:center;gap:15px;cursor:pointer;transition:all 0.2s;margin-bottom:8px}
.card:hover{border-color:var(--border-red);background:#1a1111}
.card.active{border-color:var(--accent);background:var(--bg-detail)}
.detail-row{padding:10px 13px;background:var(--bg-detail);border:1px solid var(--border-red);border-radius:8px;margin-bottom:8px}
.form-input{width:100%;padding:10px 12px;background:var(--input-bg);border:1px solid var(--border-red);border-radius:8px;color:var(--text);font-family:inherit;font-size:13px;outline:none}
.btn{padding:10px 18px;border-radius:8px;border:1px solid var(--border-red);background:transparent;color:var(--text);font-family:inherit;font-size:11px;cursor:pointer;font-weight:700;transition:all 0.2s}
.btn-primary{background:var(--accent);border-color:var(--accent);color:#fff}
.btn-danger{border-color:var(--red);color:var(--red)}

.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,0.9);z-index:200;display:flex;align-items:center;justify-content:center}
.modal{background:#181010;border:1px solid var(--accent);border-radius:16px;padding:28px;width:550px;max-width:95vw;max-height:90vh;overflow-y:auto}
</style>
</head>
<body>

<div id="saveToast">✅ Changes Saved</div>

<div class="header">
  <div class="header-top">
    <div>
      <div class="header-title">🥷 Ninja 400 Garage</div>
      <div style="font-size:10px; color:var(--text-muted); letter-spacing:2px">PRO RIDER PERFORMANCE LOG</div>
    </div>
    <div class="stats-row" id="statsRow"></div>
  </div>
</div>

<div class="nav-row">
    <div class="nav-tabs">
        <button class="nav-pill active" id="btnQUICK" onclick="setTab('QUICK')">⚡ QUICK ACTION</button>
        <button class="nav-pill" id="btnALL" onclick="setTab('ALL')">📋 ALL COMPONENTS</button>
    </div>
    <div style="display:flex; gap:5px">
        <button class="btn" style="padding:5px 10px; font-size:9px; color:var(--green)" onclick="exportData()">💾 BACKUP</button>
        <button class="btn" style="padding:5px 10px; font-size:9px" onclick="importDataTrigger()">📥 IMPORT</button>
        <button class="btn" style="padding:5px 10px; font-size:9px; border-color:var(--red)" onclick="resetData()">⚠ RESET</button>
    </div>
</div>
<input type="file" id="importFile" style="display:none" onchange="handleImport(event)">

<div id="mainContent"></div>

<div class="modal-overlay" id="modalOverlay" style="display:none" onclick="overlayClick(event)">
  <div class="modal" id="modalBox"></div>
</div>

<script>
// --- DATA SYSTEM ---
const DEF_VEHICLE = { currentKm: 30644, lastOil: "18/04/2026", purchaseDate: "19/11/2025", avgCons: 4.2, currency: "$" };
const DEF_ITEMS = [
  { id:"oil", icon:"🛢️", component:"Engine Oil & Filter", category:"ENGINE", nextKm:42644, freqKm:12000, specs:"10W-40 Full Synth, 2.3L, HF303 Filter", instructions:"Drain old oil, replace filter, refill. Check dipstick.", history:[{date:"2026-04-18", km:30644, note:"Initial log", cost:115}] },
  { id:"chain", icon:"⛓️", component:"Drive Chain", category:"DRIVE", nextKm:31244, freqKm:600, specs:"Slack: 20-30mm. Lube: Motul C4", instructions:"Clean with kerosene, apply lube. Check slack.", history:[] },
  { id:"tyres", icon:"🛞", component:"Tyres", category:"WHEELS", nextKm:null, freqKm:0, specs:"32F/36R PSI. Dunlop GPR300", instructions:"Check pressure cold. Inspect tread.", history:[] },
  { id:"brakes", icon:"🛑", component:"Brake System", category:"BRAKES", nextKm:null, freqKm:0, specs:"DOT 4 Fluid. OEM Pads.", instructions:"Check pad thickness (>1.5mm).", history:[] },
  { id:"air", icon:"💨", component:"Air Filter", category:"ENGINE", nextKm:45000, freqKm:15000, specs:"OEM Filter", instructions:"Replace if paper is dark or oily.", history:[] }
];

let V, items, currentTab = "QUICK", activeId = null;

function load() {
  V = JSON.parse(localStorage.getItem("ninja_v_p2")) || JSON.parse(JSON.stringify(DEF_VEHICLE));
  items = JSON.parse(localStorage.getItem("ninja_i_p2")) || JSON.parse(JSON.stringify(DEF_ITEMS));
}
function persist() { 
  localStorage.setItem("ninja_v_p2", JSON.stringify(V)); 
  localStorage.setItem("ninja_i_p2", JSON.stringify(items)); 
  showToast();
}
function showToast() { 
  const t = document.getElementById("saveToast"); t.style.display="block"; setTimeout(()=>t.style.display="none", 2000); 
}
const calcTotalCost = () => items.reduce((s, it) => s + it.history.reduce((sh, h) => sh + (Number(h.cost) || 0), 0), 0);

function setTab(t) {
    currentTab = t;
    document.getElementById('btnQUICK').classList.toggle('active', t === 'QUICK');
    document.getElementById('btnALL').classList.toggle('active', t === 'ALL');
    render();
}

function render() {
    renderStats();
    const container = document.getElementById("mainContent");
    if (currentTab === "QUICK") container.innerHTML = renderQuickTab();
    else container.innerHTML = renderListTab();
}

function renderStats() {
    document.getElementById("statsRow").innerHTML = `
        <div class="stat-box" onclick="editV('currentKm')"><div class="stat-label">ODO KM ✏</div><div class="stat-value">${Number(V.currentKm).toLocaleString()}</div></div>
        <div class="stat-box" onclick="editV('lastOil')"><div class="stat-label">LAST OIL ✏</div><div class="stat-value">${V.lastOil}</div></div>
        <div class="stat-box" onclick="editV('purchaseDate')"><div class="stat-label">PURCHASED ✏</div><div class="stat-value">${V.purchaseDate}</div></div>
        <div class="stat-box" onclick="editV('avgCons')"><div class="stat-label">AVG CONS ✏</div><div class="stat-value">${V.avgCons} km/L</div></div>
        <div class="stat-box"><div class="stat-label">TOTAL COST</div><div class="stat-value">${V.currency}${calcTotalCost().toLocaleString()}</div></div>
    `;
}

function renderQuickTab() {
    return `
    <div class="quick-container">
        <h2 style="font-family:'Syne'; color:#fff; margin-bottom:10px">⚡ Fast Garage Log</h2>
        ${items.slice(0,3).map(q => `
            <div class="quick-card">
                <div class="quick-question">${q.icon} ${q.component}</div>
                <div class="quick-inputs">
                    <div><label class="stat-label">Date</label><input type="date" id="q_d_${q.id}" class="form-input" value="${new Date().toISOString().split('T')[0]}"></div>
                    <div><label class="stat-label">KM</label><input type="number" id="q_k_${q.id}" class="form-input" placeholder="${V.currentKm}"></div>
                    <div><label class="stat-label">Cost</label><input type="number" id="q_c_${q.id}" class="form-input" value="0"></div>
                </div>
                <button class="btn btn-primary" style="margin-top:20px; width:100%" onclick="saveLog('${q.id}', true)">Log This Service</button>
            </div>
        `).join('')}
    </div>`;
}

function renderListTab() {
    return `
    <div class="body-wrap">
        <div class="list-panel">
            ${items.map(it => `
                <div class="card ${activeId === it.id ? 'active' : ''}" onclick="openDetail('${it.id}')">
                    <div style="font-size:20px">${it.icon}</div>
                    <div style="flex:1">
                        <div style="font-weight:700">${it.component}</div>
                        <div style="font-size:9px; color:var(--text-dim)">Next Due: ${it.nextKm ? it.nextKm.toLocaleString()+' km' : '---'}</div>
                    </div>
                </div>
            `).join('')}
            <button class="btn" style="width:100%; border-style:dashed; margin-top:10px" onclick="addNewItem()">＋ Add More Components</button>
        </div>
        <div class="detail-panel" id="detailPanel"></div>
    </div>`;
}

function openDetail(id) {
    activeId = id; render();
    const it = items.find(i => i.id === id);
    const dp = document.getElementById("detailPanel");
    dp.style.display = "block";
    dp.innerHTML = `
        <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:24px">
            <div style="font-size:20px">${it.icon} ${it.component}</div>
            <button class="btn" onclick="activeId=null;render()">✕</button>
        </div>
        <button class="btn btn-primary" style="width:100%; margin-bottom:15px" onclick="openLogModal('${it.id}')">＋ Log New Entry</button>
        <div class="detail-row"><div class="stat-label">STATUS</div><div class="stat-value" style="color:${it.nextKm && it.nextKm < V.currentKm ? 'var(--red)' : 'var(--green)'}">${it.nextKm && it.nextKm < V.currentKm ? 'OVERDUE' : 'OK'}</div></div>
        <div class="detail-row"><div class="stat-label">NEXT DUE</div><div class="stat-value">${it.nextKm ? it.nextKm.toLocaleString() + ' km' : 'Manual'}</div></div>
        <div class="detail-row"><div class="stat-label">TECH SPECS</div><div class="stat-value" style="font-size:11px; font-weight:400">${it.specs || 'None'}</div></div>
        
        <div class="stat-label" style="margin:25px 0 10px">LOG HISTORY (Tap ✕ to remove)</div>
        ${it.history.length ? [...it.history].reverse().map((h, i) => `
            <div class="detail-row" style="background:#0a0808; border-color:var(--border)">
                <div style="display:flex; justify-content:space-between; align-items:center">
                    <span style="font-weight:700; color:var(--accent-light)">${h.date}</span>
                    <button class="btn-danger" style="background:none; border:none; cursor:pointer; font-size:14px" onclick="delLog('${it.id}', ${it.history.length-1-i})">✕</button>
                </div>
                <div style="font-size:11px; margin-top:4px">${h.km.toLocaleString()} km — ${V.currency}${h.cost}</div>
            </div>`).join('') : '<div style="color:var(--text-dim); font-size:10px">No entries recorded.</div>'}

        <button class="btn btn-danger" style="width:100%; margin-top:40px; font-size:10px; opacity:0.5" onclick="delComponent('${it.id}')">DELETE COMPONENT</button>
    `;
}

function saveLog(id, fromQuick) {
    const it = items.find(i => i.id === id);
    const d = fromQuick ? document.getElementById(`q_d_${id}`).value : document.getElementById("m_d").value;
    const k = Number(fromQuick ? document.getElementById(`q_k_${id}`).value : document.getElementById("m_k").value) || V.currentKm;
    const c = Number(fromQuick ? document.getElementById(`q_c_${id}`).value : document.getElementById("m_c").value) || 0;
    
    it.history.push({ date: d, km: k, cost: c });
    if (it.freqKm > 0) it.nextKm = k + it.freqKm;
    if (k > V.currentKm) V.currentKm = k;
    if (id === 'oil') V.lastOil = d;
    
    persist(); closeM(); render();
    if (activeId === id) openDetail(id);
}

function delLog(itId, idx) {
    if(confirm("Permanently delete this entry?")) {
        items.find(i => i.id === itId).history.splice(idx, 1);
        persist(); openDetail(itId);
    }
}

function delComponent(id) {
    if(confirm("Delete this entire component and its history?")) {
        items = items.filter(i => i.id !== id);
        activeId = null; persist(); render();
    }
}

function openLogModal(id) {
    showM(`
        <div class="header-title">Log Service</div>
        <div class="quick-inputs" style="grid-template-columns:1fr 1fr; margin-top:20px">
            <div><label class="stat-label">Date</label><input type="date" id="m_d" class="form-input" value="${new Date().toISOString().split('T')[0]}"></div>
            <div><label class="stat-label">KM</label><input type="number" id="m_k" class="form-input" value="${V.currentKm}"></div>
        </div>
        <div style="margin-top:15px"><label class="stat-label">Cost</label><input type="number" id="m_c" class="form-input" value="0"></div>
        <button class="btn btn-primary" style="width:100%; margin-top:20px" onclick="saveLog('${id}', false)">Save Record</button>
    `);
}

function addNewItem() {
    const id = "item_" + Date.now();
    items.push({ id, icon:"🔧", component:"New Component", category:"GENERAL", nextKm:null, freqKm:0, specs:"", instructions:"", history:[] });
    persist(); render(); openDetail(id);
}

function editV(k) {
    const val = prompt(`Update ${k}:`, V[k]);
    if (val !== null) { V[k] = (['currentKm'].includes(k) ? Number(val) : val); persist(); render(); }
}

function exportData() {
    const blob = new Blob([JSON.stringify({ v: V, i: items }, null, 2)], { type: "application/json" });
    const a = document.createElement("a");
    a.href = URL.createObjectURL(blob);
    a.download = `ninja_garage_data.json`;
    a.click();
}

function importDataTrigger() { document.getElementById('importFile').click(); }
function handleImport(e) {
    const reader = new FileReader();
    reader.onload = (event) => {
        const data = JSON.parse(event.target.result);
        V = data.v; items = data.i;
        persist(); location.reload();
    };
    reader.readAsText(e.target.files[0]);
}

function resetData() { if(confirm("WIPE ALL LOGS?")) { localStorage.clear(); location.reload(); } }
function showM(h) { document.getElementById("modalBox").innerHTML = h; document.getElementById("modalOverlay").style.display = "flex"; }
function closeM() { document.getElementById("modalOverlay").style.display = "none"; }
function overlayClick(e) { if(e.target.id === "modalOverlay") closeM(); }

load(); render();
</script>
</body>
</html>
